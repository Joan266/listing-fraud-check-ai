# cloudbuild.yaml — NoPiques · my-vector-search-project

steps:
  # Paso 1: Construir imagen API
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/listing-fraud-repo/listing-fraud-check-api:latest'
      - '-f'
      - 'Dockerfile'
      - '.'
    id: 'Build API'

  # Paso 2: Subir imagen API
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/$PROJECT_ID/listing-fraud-repo/listing-fraud-check-api:latest']
    id: 'Push API'

  # Paso 3: Desplegar API en Cloud Run (incluye worker en el mismo contenedor)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'listing-fraud-check-api'
      - '--image'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/listing-fraud-repo/listing-fraud-check-api:latest'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--set-secrets=DATABASE_URL=db-url:latest,GOOGLE_API_KEY=google-api-key:latest,GOOGLE_GEMINI_API_KEY=google-gemini-api-key:latest,GOOGLE_SEARCH_ENGINE_ID=google-search-engine-id:latest,JWT_SECRET=jwt-secret:latest,REDIS_HOST=redis-host:latest,REDIS_PASSWORD=redis-password:latest'
      - '--set-env-vars=ENVIRONMENT=production,REDIS_SSL=true,REDIS_PORT=6379,BACKEND_CORS_ORIGINS=https://nopiques.vercel.app'
    id: 'Deploy API'

